name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (source deploy — Vercel builds natively)
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_C0BFDXgIca3sHHBbsaRw3inW
          VERCEL_PROJECT_ID: prj_aqsm7nWcs4CDeTuBXw57HI8ICQ1E
